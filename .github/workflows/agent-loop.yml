name: agent-loop

on:
  workflow_dispatch:
    inputs:
      train_run_id:
        description: "GitHub Actions run id for pmhc-train-artifacts (optional)"
        required: false
        type: string

concurrency:
  group: pmhc-agent-loop
  cancel-in-progress: false

jobs:
  propose-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: pmhc-train-artifacts
          path: artifacts/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.train_run_id }}

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          name: pmhc-benchmark-report
          path: artifacts/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Generate patch brief
        run: python scripts/generate_patch_brief.py

      - name: Upload patch brief
        uses: actions/upload-artifact@v4
        with:
          name: pmhc-patch-brief
          path: |
            artifacts/reports/patch_brief.json
            artifacts/reports/patch_proposal_log.jsonl
          retention-days: 30
