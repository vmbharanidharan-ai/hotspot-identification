name: overnight

on:
  workflow_dispatch:
    inputs:
      retrain:
        description: "Retrain model before eval (default: package-only)"
        type: boolean
        default: false
      skip_agents:
        description: "Skip Cursor SDK agent phase (metrics only)"
        type: boolean
        default: true

concurrency:
  group: pmhc-overnight
  cancel-in-progress: false

jobs:
  package-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev,ml]"

      - name: Overnight metrics (package eval; agents skipped on CI by default)
        env:
          PMHC_ALLOW_SMOKE_TRAIN: "1"
          PMHC_OVERNIGHT_SKIP_AGENTS: ${{ inputs.skip_agents }}
          PMHC_OVERNIGHT_RETRAIN: ${{ inputs.retrain }}
          PMHC_OVERNIGHT_SAVE_BASELINE: "1"
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: bash scripts/run_overnight_loop.sh || true

      - name: Upload overnight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmhc-overnight-${{ github.run_id }}
          path: |
            artifacts/reports/
          retention-days: 14
