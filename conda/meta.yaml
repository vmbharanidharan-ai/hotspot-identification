{% set name = "pmhc-hotspot" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling >=1.25
  run:
    - python >=3.9
    - numpy >=1.26
    - scipy >=1.11
    - pandas >=2.0
    - biopython >=1.83
    - pyyaml >=6.0
    - click >=8.1

test:
  imports:
    - pmhc_hotspot
    - pmhc_hotspot.benchmark
  commands:
    - pytest -q

about:
  home: https://github.com/vmbharanidharan-ai/hotspot-identification
  license: MIT
  license_family: MIT
  summary: Structure-aware hotspot selection for peptide-MHC binder design
  description: |
    pmhc-hotspot selects biologically meaningful hotspot residues on peptide-MHC
    complexes for RFdiffusion PPI binder design. Optional ML extras are published
    separately via pip install pmhc-hotspot[ml].
  doc_url: https://github.com/vmbharanidharan-ai/hotspot-identification
  dev_url: https://github.com/vmbharanidharan-ai/hotspot-identification
