{% set name = "pmhc-hotspot" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - pmhc-hotspot = pmhc_hotspot.cli:main

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - hatchling >=1.25,<2
  run:
    - python >=3.9,<3.13
    - numpy >=1.26,<2
    - scipy >=1.11,<2
    - pandas >=2.0,<3
    - biopython >=1.83,<2
    - freesasa >=2.2,<3
    - pyyaml >=6.0,<7
    - click >=8.1,<9

test:
  imports:
    - pmhc_hotspot
    - pmhc_hotspot.benchmark
    - pmhc_hotspot.data
  commands:
    - pmhc-hotspot --help
    - pytest -q

about:
  home: https://github.com/vmbharanidharan-ai/hotspot-identification
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Structure-aware hotspot selection for peptide-MHC binder design
  description: |
    pmhc-hotspot selects biologically meaningful hotspot residues on peptide-MHC
    complexes for RFdiffusion PPI binder design. Optional ML extras install via
    pip install pmhc-hotspot[ml] and are not required for the base conda package.
  doc_url: https://github.com/vmbharanidharan-ai/hotspot-identification
  dev_url: https://github.com/vmbharanidharan-ai/hotspot-identification
